  <g fill="url(#glow)" opacity="0.85">
    <!-- Top frame -->
    <circle cx="180" cy="60" r="3.5"/><circle cx="196" cy="60" r="3.5"/><circle cx="212" cy="60" r="3.5"/><circle cx="228" cy="60" r="3.5"/><circle cx="244" cy="60" r="3.5"/><circle cx="260" cy="60" r="3.5"/><circle cx="276" cy="60" r="3.5"/><circle cx="292" cy="60" r="3.5"/><circle cx="308" cy="60" r="3.5"/><circle cx="324" cy="60" r="3.5"/><circle cx="340" cy="60" r="3.5"/><circle cx="356" cy="60" r="3.5"/><circle cx="372" cy="60" r="3.5"/><circle cx="388" cy="60" r="3.5"/><circle cx="404" cy="60" r="3.5"/><circle cx="420" cy="60" r="3.5"/><circle cx="436" cy="60" r="3.5"/><circle cx="452" cy="60" r="3.5"/><circle cx="460" cy="60" r="3.5"/>
    <!-- Left frame -->

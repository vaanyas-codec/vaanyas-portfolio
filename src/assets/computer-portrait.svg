<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360" style="background:#0d0d18">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9b8d8" stop-opacity="1"/>
      <stop offset="100%" stop-color="#8b7aa8" stop-opacity="0.3"/>
    </radialGradient>
  </defs>
  <script type="text/javascript">
  </script>
  <!-- Dot-art laptop/computer portrait using circles -->

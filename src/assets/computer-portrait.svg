    <circle cx="204" cy="324" r="2.8"/><circle cx="218" cy="324" r="2.8"/><circle cx="232" cy="324" r="2.8"/><circle cx="246" cy="324" r="2.8"/><circle cx="260" cy="324" r="2.8"/><circle cx="274" cy="324" r="2.8"/><circle cx="288" cy="324" r="2.8"/><circle cx="302" cy="324" r="2.8"/><circle cx="316" cy="324" r="2.8"/><circle cx="330" cy="324" r="2.8"/><circle cx="344" cy="324" r="2.8"/><circle cx="358" cy="324" r="2.8"/><circle cx="372" cy="324" r="2.8"/><circle cx="386" cy="324" r="2.8"/><circle cx="400" cy="324" r="2.8"/><circle cx="414" cy="324" r="2.8"/><circle cx="428" cy="324" r="2.8"/><circle cx="442" cy="324" r="2.8"/>
